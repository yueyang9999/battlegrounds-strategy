<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>酒馆战棋阵容编辑器</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: "Microsoft YaHei", "PingFang SC", sans-serif; background:#0f0f1a; color:#ccc; height:100vh; display:flex; flex-direction:column; overflow:hidden; }

/* === Top Bar === */
#topbar { padding:10px 24px; background:#161625; border-bottom:1px solid #2a2a3a; display:flex; align-items:center; gap:16px; min-height:50px; }
#topbar h1 { font-size:17px; color:#f0c060; }
#topbar .nav-link { color:#888; text-decoration:none; font-size:13px; margin-left:auto; }
#topbar .nav-link:hover { color:#f0c060; }

/* === Board Area === */
#board-area { flex:1; display:flex; flex-direction:column; overflow-y:auto; padding:20px 24px; min-height:0; }
#combat-stage { display:flex; align-items:center; gap:20px; margin-bottom:20px; flex-shrink:0; }

/* Hero Panel */
#hero-panel { display:flex; flex-direction:column; gap:10px; min-width:160px; }
.slot { border:2px dashed #3a3a4a; border-radius:10px; background:#161625; cursor:pointer; transition:all .2s; position:relative; overflow:hidden; text-align:center; }
.slot:hover { border-color:#f0c060; }
.slot.active-slot { border-color:#f0c060; box-shadow:0 0 12px rgba(240,192,96,.3); }
.slot.filled { border-style:solid; border-color:#2a2a3a; }
.slot img { width:100%; height:100%; object-fit:cover; border-radius:8px; }
.slot .placeholder { color:#555; font-size:11px; position:absolute; inset:0; display:flex; align-items:center; justify-content:center; }
.slot .remove-btn { position:absolute; top:4px; right:4px; width:20px; height:20px; background:rgba(0,0,0,.7); border-radius:50%; color:#f44336; font-size:14px; line-height:18px; text-align:center; cursor:pointer; display:none; z-index:2; }
.slot.filled:hover .remove-btn { display:block; }
.slot .slot-name { position:absolute; bottom:4px; left:0; right:0; font-size:10px; color:#ddd; text-shadow:0 0 4px #000; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; padding:0 4px; }

#hero-slot { width:120px; height:160px; }
#hero-slot .stats-line { position:absolute; top:6px; left:6px; font-size:10px; color:#4caf50; text-shadow:0 0 4px #000; }
#power-slot { width:100px; height:100px; }
#lesser-slot, #greater-slot { width:56px; height:56px; border-radius:50%; }
#lesser-slot .slot-name, #greater-slot .slot-name { font-size:8px; }

.trinket-row { display:flex; gap:8px; align-items:center; }
.trinket-row .label { font-size:10px; color:#666; writing-mode:vertical-lr; }

/* Board */
#board { display:flex; gap:10px; align-items:center; flex:1; justify-content:center; }
.board-slot { width:130px; height:180px; }
.board-slot .atk-hp { position:absolute; bottom:20px; left:0; right:0; display:flex; justify-content:center; gap:8px; font-size:11px; text-shadow:0 0 4px #000; }
.board-slot .atk-hp .atk { color:#4caf50; }
.board-slot .atk-hp .hp { color:#f44336; }
.board-slot .tier-badge { position:absolute; top:6px; left:6px; background:#f0c060; color:#0f0f1a; font-size:10px; padding:1px 5px; border-radius:3px; font-weight:bold; }

/* Stats */
#stats-bar { background:#161625; border-radius:10px; padding:12px 18px; display:flex; gap:24px; align-items:center; flex-shrink:0; margin-bottom:16px; flex-wrap:wrap; }
#stats-bar .stat { font-size:13px; }
#stats-bar .stat strong { color:#f0c060; }
#stats-bar .tribe-tags { display:flex; gap:4px; flex-wrap:wrap; }
#stats-bar .tribe-tag { font-size:10px; padding:2px 8px; border-radius:3px; background:#2a2a3a; color:#888; }

/* Clear / Share buttons */
#action-row { display:flex; gap:8px; margin-bottom:12px; flex-shrink:0; }
#action-row button { padding:6px 16px; background:#1e1e30; border:1px solid #3a3a4a; border-radius:6px; color:#999; font-size:12px; cursor:pointer; }
#action-row button:hover { border-color:#f0c060; color:#f0c060; }
#action-row button.danger:hover { border-color:#f44336; color:#f44336; }

/* === Card Picker (bottom panel) === */
#picker { border-top:1px solid #2a2a3a; background:#161625; padding:12px 24px; max-height:280px; overflow-y:auto; flex-shrink:0; }
#picker-top { display:flex; gap:8px; align-items:center; margin-bottom:10px; flex-wrap:wrap; }
#picker-top input { flex:1; max-width:300px; padding:7px 12px; background:#0f0f1a; border:1px solid #3a3a4a; border-radius:6px; color:#ccc; font-size:12px; outline:none; }
#picker-top input:focus { border-color:#f0c060; }
#picker-top .picker-filters { display:flex; gap:6px; }
#picker-top .picker-filters button { padding:5px 12px; background:#1e1e30; border:1px solid #3a3a4a; border-radius:6px; color:#999; font-size:11px; cursor:pointer; }
#picker-top .picker-filters button:hover { border-color:#f0c060; color:#ddd; }
#picker-top .picker-filters button.active { background:#f0c060; color:#0f0f1a; border-color:#f0c060; font-weight:bold; }
#picker-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(100px, 1fr)); gap:8px; }
.picker-card { background:#0f0f1a; border-radius:6px; padding:6px; cursor:pointer; border:1px solid transparent; text-align:center; transition:all .15s; }
.picker-card:hover { border-color:#f0c060; background:#1e1e2e; }
.picker-card img { width:100%; max-height:70px; object-fit:contain; border-radius:4px; }
.picker-card .pname { font-size:11px; color:#ccc; margin-top:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.picker-card .psub { font-size:10px; color:#666; }

.hint { color:#555; font-size:12px; text-align:center; padding:20px; }

/* Scrollbar */
::-webkit-scrollbar { width:5px; }
::-webkit-scrollbar-track { background:#0f0f1a; }
::-webkit-scrollbar-thumb { background:#2a2a3a; border-radius:3px; }
</style>
</head>
<body>

<div id="topbar">
  <h1>🎯 酒馆战棋阵容编辑器</h1>
  <span style="color:#666;font-size:12px;">点击格子选中 → 从下方选卡填入</span>
  <a href="/panel" class="nav-link">← 返回分析面板</a>
</div>

<div id="board-area">
  <div id="combat-stage">
    <!-- Hero Panel -->
    <div id="hero-panel">
      <div class="slot" id="hero-slot" data-slot="hero">
        <div class="placeholder">点击选择<br>英雄</div>
      </div>
      <div class="slot" id="power-slot" data-slot="power">
        <div class="placeholder">英雄技能</div>
      </div>
      <div class="trinket-row">
        <span class="label">低阶</span>
        <div class="slot" id="lesser-slot" data-slot="lesser">
          <div class="placeholder" style="font-size:9px;">饰品</div>
        </div>
        <span class="label">高阶</span>
        <div class="slot" id="greater-slot" data-slot="greater">
          <div class="placeholder" style="font-size:9px;">饰品</div>
        </div>
      </div>
    </div>

    <!-- Board -->
    <div id="board"></div>
  </div>

  <!-- Stats -->
  <div id="stats-bar">
    <div class="stat">随从: <strong id="stat-count">0</strong>/7</div>
    <div class="stat">总攻击: <strong id="stat-atk">0</strong></div>
    <div class="stat">总血量: <strong id="stat-hp">0</strong></div>
    <div class="stat" id="stat-tribes"></div>
  </div>

  <!-- Actions -->
  <div id="action-row">
    <button onclick="exportComp()">📋 导出阵容</button>
    <button onclick="clearAll()" class="danger">🗑️ 清空全部</button>
  </div>
</div>

<!-- Card Picker -->
<div id="picker">
  <div id="picker-top">
    <input type="text" id="picker-search" placeholder="搜索卡牌...">
    <div class="picker-filters" id="picker-filters">
      <button class="active" data-pick="heroes">英雄</button>
      <button data-pick="minions">随从</button>
      <button data-pick="powers">技能</button>
      <button data-pick="trinkets">饰品</button>
      <button data-pick="timewarps">法术</button>
      <button data-pick="companions">伙伴</button>
    </div>
  </div>
  <div id="picker-grid"></div>
</div>

<script>
// =============================================================================
const $ = (s, e) => (e || document).querySelector(s);
const $$ = (s, e) => [...(e || document).querySelectorAll(s)];

// =============================================================================
// Data
// =============================================================================
const DB = {};
let activeSlot = null;

const SLOT_TYPES = {
  hero: { accept: ['hero'] },
  power: { accept: ['hero_power'] },
  lesser: { accept: ['trinket'], lesser: true },
  greater: { accept: ['trinket'], lesser: false },
  minion: { accept: ['minion', 'companion'] },
};

async function loadData() {
  const ep = u => fetch(u).then(r => r.json());
  const [cards, heroes, minions, trinkets, companions, qr,
         anomalies, timewarps, heroPowers] =
    await Promise.all([
      ep('/api/cards'), ep('/api/heroes'), ep('/api/minions'),
      ep('/api/trinkets'), ep('/api/companions'), ep('/api/quests_rewards'),
      ep('/api/anomalies'), ep('/api/timewarps'), ep('/api/hero_powers'),
    ]);

  Object.assign(DB, {
    cards, heroes, minions, trinkets, companions,
    quests: qr.quests || [], rewards: qr.rewards || [],
    anomalies, timewarps, heroPowers,
  });

  // Indexes
  DB.cardById = {}; cards.forEach(c => DB.cardById[c.str_id] = c);
  DB.heroById = {}; heroes.forEach(h => DB.heroById[h.str_id] = h);
}

// =============================================================================
// Slots
// =============================================================================
const slots = {}; // slotId -> cardData | null

function buildSlots() {
  // Hero panel slots
  ['hero','power','lesser','greater'].forEach(id => {
    slots[id] = null;
    const el = $(`#${id}-slot`);
    el.addEventListener('click', () => selectSlot(id));
  });

  // Board slots (7 minions)
  let boardHTML = '';
  for (let i = 1; i <= 7; i++) {
    const sid = `minion-${i}`;
    slots[sid] = null;
    boardHTML += `<div class="slot board-slot" id="slot-${sid}" data-slot="${sid}">
      <div class="placeholder">随从 ${i}</div>
    </div>`;
  }
  $('#board').innerHTML = boardHTML;
  for (let i = 1; i <= 7; i++) {
    const sid = `minion-${i}`;
    $(`#slot-${sid}`).addEventListener('click', () => selectSlot(sid));
  }
}

function selectSlot(slotId) {
  activeSlot = slotId;
  // Highlight
  $$('.slot').forEach(s => s.classList.remove('active-slot'));
  const el = $(`#${slotId.includes('minion') ? 'slot-' + slotId : slotId + '-slot'}`);
  if (el) el.classList.add('active-slot');
  // Auto-set picker filter based on slot type
  const info = SLOT_TYPES[slotId.includes('minion') ? 'minion' : slotId];
  if (info) {
    const pickCat = info.accept[0] === 'hero_power' ? 'powers' :
                    info.accept[0] === 'hero' ? 'heroes' :
                    info.accept[0] === 'trinket' ? 'trinkets' :
                    info.accept[0] === 'minion' ? 'minions' : 'heroes';
    setPickerFilter(pickCat);
  }
  renderPicker();
}

function fillSlot(slotId, card) {
  slots[slotId] = card;
  const el = $(`#${slotId.includes('minion') ? 'slot-' + slotId : slotId + '-slot'}`);
  if (!el) return;
  el.classList.add('filled');
  const img = card.img ? `<img src="${esc(card.img)}" onerror="this.style.display='none'">` : '';
  const name = card.name_cn || card.name || '';
  let extra = '';

  if (slotId === 'hero') {
    const hero = DB.heroById[card.str_id];
    const armor = hero ? hero.armor : (card.armor || 0);
    const health = hero ? hero.health : (card.health || 30);
    extra = `<div class="stats-line">❤${health} 🛡${armor}</div>`;
  }
  if (slotId.includes('minion')) {
    extra = `<div class="atk-hp"><span class="atk">⚔${card.attack || 0}</span><span class="hp">❤${card.health || 0}</span></div>`;
    if (card.tier) extra += `<div class="tier-badge">⭐${card.tier}</div>`;
  }
  if (slotId === 'lesser' || slotId === 'greater') {
    extra = `<div class="slot-name">${name}</div>`;
  }

  el.innerHTML = `${img}${extra}<div class="slot-name">${name}</div><div class="remove-btn" id="rm-${slotId}">✕</div>`;
  el.querySelector(`#rm-${slotId}`).addEventListener('click', e => {
    e.stopPropagation();
    clearSlot(slotId);
  });

  // Auto-fill hero power when hero selected
  if (slotId === 'hero') {
    const hero = DB.heroById[card.str_id];
    if (hero && hero.hp_ids && hero.hp_ids.length) {
      const hp = DB.heroPowers.find(p => p.str_id === hero.hp_ids[0]);
      if (hp) fillSlot('power', hp);
    }
    if (hero && hero.buddy_id) {
      // Could auto-add buddy but let user decide
    }
  }

  updateStats();
}

function clearSlot(slotId) {
  slots[slotId] = null;
  const el = $(`#${slotId.includes('minion') ? 'slot-' + slotId : slotId + '-slot'}`);
  if (!el) return;
  el.classList.remove('filled');
  const labels = {
    hero: '点击选择<br>英雄', power: '英雄技能',
    lesser: '饰品', greater: '饰品',
  };
  const label = slotId.includes('minion') ? `随从 ${slotId.split('-')[1]}` : (labels[slotId] || slotId);
  el.innerHTML = `<div class="placeholder">${label}</div>`;
  updateStats();
}

function clearAll() {
  Object.keys(slots).forEach(k => clearSlot(k));
  activeSlot = null;
  $$('.slot').forEach(s => s.classList.remove('active-slot'));
  updateStats();
}

// =============================================================================
// Stats
// =============================================================================
function updateStats() {
  let count = 0, totalAtk = 0, totalHp = 0;
  const tribes = new Set();
  for (let i = 1; i <= 7; i++) {
    const c = slots[`minion-${i}`];
    if (!c) continue;
    count++;
    totalAtk += c.attack || 0;
    totalHp += c.health || 0;
    (c.minion_types_cn || []).forEach(t => tribes.add(t));
  }
  $('#stat-count').textContent = count;
  $('#stat-atk').textContent = totalAtk;
  $('#stat-hp').textContent = totalHp;
  if (tribes.size) {
    $('#stat-tribes').innerHTML = `<span class="tribe-tags">${[...tribes].map(t => `<span class="tribe-tag">${t}</span>`).join('')}</span>`;
  } else {
    $('#stat-tribes').innerHTML = '';
  }
}

// =============================================================================
// Picker
// =============================================================================
let pickerCat = 'heroes';

function setPickerFilter(cat) {
  pickerCat = cat;
  $$('#picker-filters button').forEach(b => {
    b.classList.toggle('active', b.dataset.pick === cat);
  });
}

$('#picker-filters').addEventListener('click', e => {
  const btn = e.target.closest('button');
  if (!btn) return;
  setPickerFilter(btn.dataset.pick);
  renderPicker();
});

function getPickerList() {
  switch (pickerCat) {
    case 'heroes': return DB.heroes;
    case 'minions': return [...DB.minions, ...DB.companions];
    case 'powers': return DB.heroPowers;
    case 'trinkets': return DB.trinkets;
    case 'timewarps': return DB.timewarps;
    case 'companions': return DB.companions;
    default: return [];
  }
}

function renderPicker() {
  let list = getPickerList();
  const q = $('#picker-search').value.trim().toLowerCase();
  if (q) list = list.filter(c => c.name_cn.toLowerCase().includes(q) || (c.name || '').toLowerCase().includes(q));

  // If a slot is active, filter to compatible cards
  if (activeSlot) {
    const info = SLOT_TYPES[activeSlot.includes('minion') ? 'minion' : activeSlot];
    if (info) {
      list = list.filter(c => {
        const ct = (c.card_type === 'hero_power' || c.card_type === 'heroPower') ? 'hero_power' : c.card_type;
        if (!info.accept.includes(ct)) return false;
        if (info.lesser !== undefined && c.lesser !== info.lesser) return false;
        return true;
      });
    }
  }

  if (!list.length) {
    $('#picker-grid').innerHTML = '<div class="hint">没有匹配的卡牌</div>';
    return;
  }

  $('#picker-grid').innerHTML = list.map(c => `
    <div class="picker-card" data-cid="${c.str_id}">
      <img src="${esc(c.img || '')}" loading="lazy" onerror="this.style.display='none'">
      <div class="pname">${esc(c.name_cn)}</div>
      <div class="psub">${c.tier ? '⭐'+c.tier : ''} ${c.attack ? '⚔'+c.attack : ''} ${c.health ? '❤'+c.health : ''} ${c.mana_cost ? '💰'+c.mana_cost : ''}</div>
    </div>
  `).join('');
}

$('#picker-grid').addEventListener('click', e => {
  const cardEl = e.target.closest('.picker-card');
  if (!cardEl) return;
  const cid = cardEl.dataset.cid;
  const card = DB.cardById[cid];
  if (!card || !activeSlot) return;

  // Check compatibility
  const info = SLOT_TYPES[activeSlot.includes('minion') ? 'minion' : activeSlot];
  if (info) {
    const ct = (card.card_type === 'hero_power' || card.card_type === 'heroPower') ? 'hero_power' : card.card_type;
    if (!info.accept.includes(ct)) return;
    if (info.lesser !== undefined && card.lesser !== info.lesser) return;
  }

  fillSlot(activeSlot, card);

  // Auto-advance to next empty board slot
  if (activeSlot.includes('minion')) {
    const n = parseInt(activeSlot.split('-')[1]);
    if (n < 7 && !slots[`minion-${n+1}`]) {
      selectSlot(`minion-${n+1}`);
    }
  }
});

// Search
let searchTimer;
$('#picker-search').addEventListener('input', function() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(renderPicker, 150);
});

// =============================================================================
// Export
// =============================================================================
function exportComp() {
  const hero = slots['hero'];
  const power = slots['power'];
  const lesser = slots['lesser'];
  const greater = slots['greater'];
  const minions = [];
  for (let i = 1; i <= 7; i++) {
    const m = slots[`minion-${i}`];
    if (m) minions.push(m);
  }

  let text = '=== 酒馆战棋阵容 ===\n\n';
  text += `英雄: ${hero ? hero.name_cn : '(未选)'}\n`;
  text += `技能: ${power ? power.name_cn + (power.mana_cost ? ` (${power.mana_cost}费)` : '') : '(未选)'}\n`;
  text += `低阶饰品: ${lesser ? lesser.name_cn : '(未选)'}\n`;
  text += `高阶饰品: ${greater ? greater.name_cn : '(未选)'}\n`;
  text += `\n随从阵容:\n`;
  minions.forEach((m, i) => {
    text += `  ${i+1}. ${m.name_cn} ${m.tier ? '⭐'+m.tier : ''} ${m.attack || 0}/${m.health || 0}`;
    if (m.minion_types_cn && m.minion_types_cn.length) text += ` [${m.minion_types_cn.join(', ')}]`;
    text += '\n';
  });

  const totalAtk = minions.reduce((s,m) => s + (m.attack||0), 0);
  const totalHp = minions.reduce((s,m) => s + (m.health||0), 0);
  text += `\n总攻击: ${totalAtk}  总血量: ${totalHp}`;

  // Copy to clipboard
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => alert('阵容已复制到剪贴板!'));
  } else {
    alert(text);
  }
}

// =============================================================================
// Utils
// =============================================================================
function esc(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'<').replace(/>/g,'>').replace(/"/g,'&quot;'); }

// =============================================================================
// Boot
// =============================================================================
async function boot() {
  await loadData();
  buildSlots();
  selectSlot('hero'); // Start with hero selection
  renderPicker();
  updateStats();
}
boot();
</script>
</body>
</html>
