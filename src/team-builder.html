<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>酒馆战棋阵容编辑器</title>
<style>
:root {
  --c-positive: #4caf50;
  --c-positive-glow: rgba(76,175,80,0.2);
  --c-accent: #f0c060;
  --c-accent-glow: rgba(240,192,96,0.15);
  --c-danger: #f44336;
  --c-blue: #2196F3;
  --bg-deep: #0f0f1a;
  --bg-panel: rgba(22,22,37,0.94);
  --bg-card: rgba(22,22,37,0.78);
  --bg-hover: rgba(30,30,50,0.88);
  --bg-input: rgba(15,15,26,0.75);
  --border-subtle: rgba(42,42,58,0.65);
  --text-primary: rgba(255,255,255,0.9);
  --text-secondary: rgba(255,255,255,0.58);
  --text-muted: rgba(255,255,255,0.32);
  --shadow-text: 0 1px 3px rgba(0,0,0,0.7);
  --r-sm: 4px;  --r-md: 6px;  --r-lg: 10px;
  --ease: 0.2s ease;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Microsoft YaHei", "PingFang SC", sans-serif; background:var(--bg-deep); color:var(--text-primary); height:100vh; display:flex; flex-direction:column; overflow:hidden; }

#topbar { padding:10px 24px; background:var(--bg-panel); border-bottom:1px solid var(--border-subtle); display:flex; align-items:center; gap:16px; min-height:50px; backdrop-filter:blur(8px); }
#topbar h1 { font-size:17px; color:var(--c-accent); text-shadow:var(--shadow-text); }
#topbar .nav-link { color:var(--text-muted); text-decoration:none; font-size:13px; margin-left:auto; transition:color var(--ease); }
#topbar .nav-link:hover { color:var(--c-accent); }

#board-area { flex:1; display:flex; flex-direction:column; overflow-y:auto; padding:20px 24px; min-height:0; }
#combat-stage { display:flex; align-items:center; gap:20px; margin-bottom:20px; flex-shrink:0; }

#hero-panel { display:flex; flex-direction:column; gap:10px; min-width:160px; }
.slot { border:2px dashed var(--border-subtle); border-radius:var(--r-lg); background:var(--bg-card); cursor:pointer; transition:border-color var(--ease), box-shadow var(--ease); position:relative; overflow:hidden; text-align:center; backdrop-filter:blur(4px); }
.slot:hover { border-color:var(--c-accent); }
.slot.active-slot { border-color:var(--c-positive); box-shadow:0 0 12px var(--c-positive-glow); }
.slot.filled { border-style:solid; border-color:var(--border-subtle); }
.slot img { width:100%; height:100%; object-fit:cover; border-radius:6px; }
.slot .placeholder { color:var(--text-muted); font-size:11px; position:absolute; inset:0; display:flex; align-items:center; justify-content:center; }
.slot .remove-btn { position:absolute; top:4px; right:4px; width:20px; height:20px; background:rgba(0,0,0,.7); border-radius:50%; color:var(--c-danger); font-size:14px; line-height:18px; text-align:center; cursor:pointer; display:none; z-index:2; }
.slot.filled:hover .remove-btn { display:block; }
.slot .slot-name { position:absolute; bottom:4px; left:0; right:0; font-size:10px; color:var(--text-primary); text-shadow:0 0 4px #000; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; padding:0 4px; }

#hero-slot { width:120px; height:160px; }
#hero-slot .stats-line { position:absolute; top:6px; left:6px; font-size:10px; color:var(--c-positive); text-shadow:0 0 4px #000; }
#power-slot { width:100px; height:100px; }
#lesser-slot, #greater-slot { width:56px; height:56px; border-radius:50%; }
#lesser-slot .slot-name, #greater-slot .slot-name { font-size:8px; }

.trinket-row { display:flex; gap:8px; align-items:center; }
.trinket-row .label { font-size:10px; color:var(--text-muted); writing-mode:vertical-lr; }

#board { display:flex; gap:10px; align-items:center; flex:1; justify-content:center; }
.board-slot { width:130px; height:180px; }
.board-slot .atk-hp { position:absolute; bottom:20px; left:0; right:0; display:flex; justify-content:center; gap:8px; font-size:11px; text-shadow:0 0 4px #000; }
.board-slot .atk-hp .atk { color:var(--c-positive); }
.board-slot .atk-hp .hp { color:var(--c-danger); }
.board-slot .tier-badge { position:absolute; top:6px; left:6px; background:var(--c-accent); color:var(--bg-deep); font-size:10px; padding:1px 5px; border-radius:var(--r-sm); font-weight:bold; }

#stats-bar { background:var(--bg-card); border-radius:var(--r-lg); padding:12px 18px; display:flex; gap:24px; align-items:center; flex-shrink:0; margin-bottom:16px; flex-wrap:wrap; backdrop-filter:blur(4px); border:1px solid var(--border-subtle); }
#stats-bar .stat { font-size:13px; }
#stats-bar .stat strong { color:var(--c-accent); }
#stats-bar .tribe-tags { display:flex; gap:4px; flex-wrap:wrap; }
#stats-bar .tribe-tag { font-size:10px; padding:2px 8px; border-radius:var(--r-sm); background:rgba(42,42,58,0.5); color:var(--text-muted); }

#action-row { display:flex; gap:8px; margin-bottom:12px; flex-shrink:0; }
#action-row button { padding:6px 16px; background:var(--bg-card); border:1px solid var(--border-subtle); border-radius:var(--r-md); color:var(--text-secondary); font-size:12px; cursor:pointer; transition:all var(--ease); }
#action-row button:hover { border-color:var(--c-accent); color:var(--c-accent); }
#action-row button.danger:hover { border-color:var(--c-danger); color:var(--c-danger); }

#picker { border-top:1px solid var(--border-subtle); background:var(--bg-panel); padding:12px 24px; max-height:280px; overflow-y:auto; flex-shrink:0; backdrop-filter:blur(8px); }
#picker-top { display:flex; gap:8px; align-items:center; margin-bottom:10px; flex-wrap:wrap; }
#picker-top input { flex:1; max-width:300px; padding:7px 12px; background:var(--bg-input); border:1px solid var(--border-subtle); border-radius:var(--r-md); color:var(--text-primary); font-size:12px; outline:none; transition:border-color var(--ease); }
#picker-top input:focus { border-color:var(--c-accent); }
#picker-top .picker-filters { display:flex; gap:6px; }
#picker-top .picker-filters button { padding:5px 12px; background:var(--bg-card); border:1px solid var(--border-subtle); border-radius:var(--r-md); color:var(--text-secondary); font-size:11px; cursor:pointer; transition:all var(--ease); }
#picker-top .picker-filters button:hover { border-color:var(--c-accent); color:var(--text-primary); }
#picker-top .picker-filters button.active { background:var(--c-accent); color:var(--bg-deep); border-color:var(--c-accent); font-weight:bold; }
#picker-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(100px, 1fr)); gap:8px; }
.picker-card { background:var(--bg-card); border-radius:var(--r-md); padding:6px; cursor:pointer; border:1px solid var(--border-subtle); text-align:center; transition:border-color var(--ease), background var(--ease); }
.picker-card:hover { border-color:var(--c-accent); background:var(--bg-hover); }
.picker-card img { width:100%; max-height:70px; object-fit:contain; border-radius:var(--r-sm); }
.picker-card .pname { font-size:11px; color:var(--text-primary); margin-top:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.picker-card .psub { font-size:10px; color:var(--text-muted); }

.hint { color:var(--text-muted); font-size:12px; text-align:center; padding:20px; }

/* Modal */
#modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:100; display:none; align-items:center; justify-content:center; backdrop-filter:blur(4px); }
#modal-overlay.show { display:flex; }
#modal-box { background:var(--bg-panel); border:1px solid var(--border-subtle); border-radius:var(--r-lg); padding:24px; max-width:900px; width:95%; max-height:85vh; overflow-y:auto; }
#modal-box h2 { color:var(--c-accent); font-size:16px; margin-bottom:16px; }
#modal-box .modal-close { float:right; background:none; border:none; color:var(--text-muted); font-size:20px; cursor:pointer; }
#modal-box .modal-close:hover { color:var(--c-danger); }

/* Saved comps list */
.saved-comp-item { background:var(--bg-card); border:1px solid var(--border-subtle); border-radius:var(--r-md); padding:12px; margin-bottom:8px; display:flex; align-items:center; gap:12px; transition:border-color var(--ease); }
.saved-comp-item:hover { border-color:var(--c-accent); }
.saved-comp-item .comp-name { font-size:14px; color:var(--text-primary); flex:1; min-width:0; }
.saved-comp-item .comp-meta { font-size:11px; color:var(--text-muted); white-space:nowrap; }
.saved-comp-item .comp-preview { font-size:11px; color:var(--text-secondary); display:flex; gap:4px; flex-wrap:wrap; max-width:300px; }
.saved-comp-item .comp-preview span { background:rgba(42,42,58,0.5); padding:1px 6px; border-radius:var(--r-sm); white-space:nowrap; }
.saved-comp-item button { padding:4px 12px; background:var(--bg-hover); border:1px solid var(--border-subtle); border-radius:var(--r-sm); color:var(--text-secondary); font-size:11px; cursor:pointer; white-space:nowrap; transition:all var(--ease); }
.saved-comp-item button:hover { border-color:var(--c-accent); color:var(--c-accent); }
.saved-comp-item button.danger:hover { border-color:var(--c-danger); color:var(--c-danger); }

/* Compare table */
#compare-table { width:100%; border-collapse:collapse; margin-top:12px; font-size:13px; }
#compare-table th { padding:8px 12px; text-align:left; color:var(--text-muted); font-weight:normal; border-bottom:1px solid var(--border-subtle); white-space:nowrap; }
#compare-table td { padding:8px 12px; border-bottom:1px solid rgba(42,42,58,0.3); vertical-align:top; }
#compare-table .comp-col { min-width:160px; }
#compare-table .comp-header { color:var(--c-accent); font-weight:bold; font-size:14px; }
#compare-table .stat-val { font-weight:bold; }
#compare-table .stat-pos { color:var(--c-positive); }
#compare-table .stat-neg { color:var(--c-danger); }
#compare-table .card-chip { display:inline-block; padding:2px 6px; background:rgba(42,42,58,0.5); border-radius:var(--r-sm); margin:1px 2px; font-size:11px; }

.compare-select { display:flex; gap:8px; align-items:center; margin-bottom:12px; flex-wrap:wrap; }
.compare-select label { font-size:12px; color:var(--text-muted); display:flex; align-items:center; gap:4px; }
.compare-select input[type=checkbox] { accent-color:var(--c-accent); }

::-webkit-scrollbar { width:5px; }
::-webkit-scrollbar-track { background:var(--bg-deep); }
::-webkit-scrollbar-thumb { background:var(--border-subtle); border-radius:3px; }
</style>
</head>
<body>

<div id="topbar">
  <h1>🎯 酒馆战棋阵容编辑器</h1>
  <span style="color:var(--text-muted);font-size:12px;">点击格子选中 → 从下方选卡填入</span>
  <a href="/panel" class="nav-link">← 返回分析面板</a>
</div>

<div id="board-area">
  <div id="combat-stage">
    <!-- Hero Panel -->
    <div id="hero-panel">
      <div class="slot" id="hero-slot" data-slot="hero">
        <div class="placeholder">点击选择<br>英雄</div>
      </div>
      <div class="slot" id="power-slot" data-slot="power">
        <div class="placeholder">英雄技能</div>
      </div>
      <div class="trinket-row">
        <span class="label">低阶</span>
        <div class="slot" id="lesser-slot" data-slot="lesser">
          <div class="placeholder" style="font-size:9px;">饰品</div>
        </div>
        <span class="label">高阶</span>
        <div class="slot" id="greater-slot" data-slot="greater">
          <div class="placeholder" style="font-size:9px;">饰品</div>
        </div>
      </div>
    </div>

    <!-- Board -->
    <div id="board"></div>
  </div>

  <!-- Stats -->
  <div id="stats-bar">
    <div class="stat">随从: <strong id="stat-count">0</strong>/7</div>
    <div class="stat">总攻击: <strong id="stat-atk">0</strong></div>
    <div class="stat">总血量: <strong id="stat-hp">0</strong></div>
    <div class="stat" id="stat-tribes"></div>
  </div>

  <!-- Actions -->
  <div id="action-row">
    <button onclick="exportComp()">📋 导出阵容</button>
    <button onclick="saveComp()">💾 保存阵容</button>
    <button onclick="showSavedComps()">📂 我的阵容</button>
    <button onclick="clearAll()" class="danger">🗑️ 清空全部</button>
  </div>
</div>

<!-- Modal -->
<div id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div id="modal-box"></div>
</div>

<!-- Card Picker -->
<div id="picker">
  <div id="picker-top">
    <input type="text" id="picker-search" placeholder="搜索卡牌...">
    <div class="picker-filters" id="picker-filters">
      <button class="active" data-pick="heroes">英雄</button>
      <button data-pick="minions">随从</button>
      <button data-pick="powers">技能</button>
      <button data-pick="trinkets">饰品</button>
      <button data-pick="timewarps">法术</button>
      <button data-pick="companions">伙伴</button>
    </div>
  </div>
  <div id="picker-grid"><div class="hint">加载中...</div></div>
</div>

<script>
// =============================================================================
const $ = (s, e) => (e || document).querySelector(s);
const $$ = (s, e) => [...(e || document).querySelectorAll(s)];

// =============================================================================
// Data
// =============================================================================
const DB = {};
let activeSlot = null;

const SLOT_TYPES = {
  hero: { accept: ['hero'] },
  power: { accept: ['hero_power'] },
  lesser: { accept: ['trinket'], lesser: true },
  greater: { accept: ['trinket'], lesser: false },
  minion: { accept: ['minion', 'companion'] },
};

async function loadData() {
  const ep = u => fetch(u).then(r => r.json());
  const [cards, heroes, minions, trinkets, companions, qr,
         anomalies, timewarps, heroPowers] =
    await Promise.all([
      ep('/api/cards'), ep('/api/heroes'), ep('/api/minions'),
      ep('/api/trinkets'), ep('/api/companions'), ep('/api/quests_rewards'),
      ep('/api/anomalies'), ep('/api/timewarps'), ep('/api/hero_powers'),
    ]);

  Object.assign(DB, {
    cards, heroes, minions, trinkets, companions,
    quests: qr.quests || [], rewards: qr.rewards || [],
    anomalies, timewarps, heroPowers,
  });

  // Indexes
  DB.cardById = {}; cards.forEach(c => DB.cardById[c.str_id] = c);
  DB.heroById = {}; heroes.forEach(h => DB.heroById[h.str_id] = h);
}

// =============================================================================
// Slots
// =============================================================================
const slots = {}; // slotId -> cardData | null

function buildSlots() {
  // Hero panel slots
  ['hero','power','lesser','greater'].forEach(id => {
    slots[id] = null;
    const el = $(`#${id}-slot`);
    el.addEventListener('click', () => selectSlot(id));
  });

  // Board slots (7 minions)
  let boardHTML = '';
  for (let i = 1; i <= 7; i++) {
    const sid = `minion-${i}`;
    slots[sid] = null;
    boardHTML += `<div class="slot board-slot" id="slot-${sid}" data-slot="${sid}">
      <div class="placeholder">随从 ${i}</div>
    </div>`;
  }
  $('#board').innerHTML = boardHTML;
  for (let i = 1; i <= 7; i++) {
    const sid = `minion-${i}`;
    $(`#slot-${sid}`).addEventListener('click', () => selectSlot(sid));
  }
}

function selectSlot(slotId) {
  activeSlot = slotId;
  // Highlight
  $$('.slot').forEach(s => s.classList.remove('active-slot'));
  const el = $(`#${slotId.includes('minion') ? 'slot-' + slotId : slotId + '-slot'}`);
  if (el) el.classList.add('active-slot');
  // Auto-set picker filter based on slot type
  const info = SLOT_TYPES[slotId.includes('minion') ? 'minion' : slotId];
  if (info) {
    const pickCat = info.accept[0] === 'hero_power' ? 'powers' :
                    info.accept[0] === 'hero' ? 'heroes' :
                    info.accept[0] === 'trinket' ? 'trinkets' :
                    info.accept[0] === 'minion' ? 'minions' : 'heroes';
    setPickerFilter(pickCat);
  }
  renderPicker();
}

function fillSlot(slotId, card) {
  slots[slotId] = card;
  const el = $(`#${slotId.includes('minion') ? 'slot-' + slotId : slotId + '-slot'}`);
  if (!el) return;
  el.classList.add('filled');
  const img = card.img ? `<img src="${esc(card.img)}" onerror="this.style.display='none'">` : '';
  const name = card.name_cn || card.name || '';
  let extra = '';

  if (slotId === 'hero') {
    const hero = DB.heroById[card.str_id];
    const armor = hero ? hero.armor : (card.armor || 0);
    const health = hero ? hero.health : (card.health || 30);
    extra = `<div class="stats-line">❤${health} 🛡${armor}</div>`;
  }
  if (slotId.includes('minion')) {
    extra = `<div class="atk-hp"><span class="atk">⚔${card.attack || 0}</span><span class="hp">❤${card.health || 0}</span></div>`;
    if (card.tier) extra += `<div class="tier-badge">⭐${card.tier}</div>`;
  }
  if (slotId === 'lesser' || slotId === 'greater') {
    extra = `<div class="slot-name">${name}</div>`;
  }

  el.innerHTML = `${img}${extra}<div class="slot-name">${name}</div><div class="remove-btn" id="rm-${slotId}">✕</div>`;
  el.querySelector(`#rm-${slotId}`).addEventListener('click', e => {
    e.stopPropagation();
    clearSlot(slotId);
  });

  // Auto-fill hero power when hero selected
  if (slotId === 'hero') {
    const hero = DB.heroById[card.str_id];
    if (hero && hero.hp_ids && hero.hp_ids.length) {
      const hp = DB.heroPowers.find(p => p.str_id === hero.hp_ids[0]);
      if (hp) fillSlot('power', hp);
    }
    if (hero && hero.buddy_id) {
      // Could auto-add buddy but let user decide
    }
  }

  updateStats();
}

function clearSlot(slotId) {
  slots[slotId] = null;
  const el = $(`#${slotId.includes('minion') ? 'slot-' + slotId : slotId + '-slot'}`);
  if (!el) return;
  el.classList.remove('filled');
  const labels = {
    hero: '点击选择<br>英雄', power: '英雄技能',
    lesser: '饰品', greater: '饰品',
  };
  const label = slotId.includes('minion') ? `随从 ${slotId.split('-')[1]}` : (labels[slotId] || slotId);
  el.innerHTML = `<div class="placeholder">${label}</div>`;
  updateStats();
}

function clearAll() {
  Object.keys(slots).forEach(k => clearSlot(k));
  activeSlot = null;
  $$('.slot').forEach(s => s.classList.remove('active-slot'));
  updateStats();
}

// =============================================================================
// Stats
// =============================================================================
function updateStats() {
  let count = 0, totalAtk = 0, totalHp = 0;
  const tribes = new Set();
  for (let i = 1; i <= 7; i++) {
    const c = slots[`minion-${i}`];
    if (!c) continue;
    count++;
    totalAtk += c.attack || 0;
    totalHp += c.health || 0;
    (c.minion_types_cn || []).forEach(t => tribes.add(t));
  }
  $('#stat-count').textContent = count;
  $('#stat-atk').textContent = totalAtk;
  $('#stat-hp').textContent = totalHp;
  if (tribes.size) {
    $('#stat-tribes').innerHTML = `<span class="tribe-tags">${[...tribes].map(t => `<span class="tribe-tag">${t}</span>`).join('')}</span>`;
  } else {
    $('#stat-tribes').innerHTML = '';
  }
}

// =============================================================================
// Picker
// =============================================================================
let pickerCat = 'heroes';

function setPickerFilter(cat) {
  pickerCat = cat;
  $$('#picker-filters button').forEach(b => {
    b.classList.toggle('active', b.dataset.pick === cat);
  });
}

$('#picker-filters').addEventListener('click', e => {
  const btn = e.target.closest('button');
  if (!btn) return;
  setPickerFilter(btn.dataset.pick);
  $('#picker-search').value = '';
  renderPicker();
});

function getPickerList() {
  switch (pickerCat) {
    case 'heroes': return DB.heroes;
    case 'minions': return [...DB.minions, ...DB.companions];
    case 'powers': return DB.heroPowers;
    case 'trinkets': return DB.trinkets;
    case 'timewarps': return DB.timewarps;
    case 'companions': return DB.companions;
    default: return [];
  }
}

function renderPicker() {
  let list = getPickerList();
  const q = $('#picker-search').value.trim().toLowerCase();
  if (q) list = list.filter(c => c.name_cn.toLowerCase().includes(q) || (c.name || '').toLowerCase().includes(q));

  // If a slot is active, filter to compatible cards
  if (activeSlot) {
    const info = SLOT_TYPES[activeSlot.includes('minion') ? 'minion' : activeSlot];
    if (info) {
      list = list.filter(c => {
        const ct = (c.card_type === 'hero_power' || c.card_type === 'heroPower') ? 'hero_power' : c.card_type;
        if (!info.accept.includes(ct)) return false;
        if (info.lesser !== undefined && c.lesser !== info.lesser) return false;
        return true;
      });
    }
  }

  if (!list.length) {
    const hint = q ? `没有匹配「${esc(q)}」的卡牌` : '此分类暂无可选卡牌';
    $('#picker-grid').innerHTML = `<div class="hint">${hint}</div>`;
    return;
  }

  $('#picker-grid').innerHTML = list.map(c => `
    <div class="picker-card" data-cid="${c.str_id}">
      <img src="${esc(c.img || '')}" loading="lazy" onerror="this.style.display='none'">
      <div class="pname">${esc(c.name_cn)}</div>
      <div class="psub">${c.tier ? '⭐'+c.tier : ''} ${c.attack ? '⚔'+c.attack : ''} ${c.health ? '❤'+c.health : ''} ${c.mana_cost ? '💰'+c.mana_cost : ''}</div>
    </div>
  `).join('');
}

$('#picker-grid').addEventListener('click', e => {
  const cardEl = e.target.closest('.picker-card');
  if (!cardEl) return;
  const cid = cardEl.dataset.cid;
  const card = DB.cardById[cid];
  if (!card || !activeSlot) return;

  // Check compatibility
  const info = SLOT_TYPES[activeSlot.includes('minion') ? 'minion' : activeSlot];
  if (info) {
    const ct = (card.card_type === 'hero_power' || card.card_type === 'heroPower') ? 'hero_power' : card.card_type;
    if (!info.accept.includes(ct)) return;
    if (info.lesser !== undefined && card.lesser !== info.lesser) return;
  }

  fillSlot(activeSlot, card);

  // Auto-advance to next empty board slot
  if (activeSlot.includes('minion')) {
    const n = parseInt(activeSlot.split('-')[1]);
    if (n < 7 && !slots[`minion-${n+1}`]) {
      selectSlot(`minion-${n+1}`);
    }
  }
});

let searchTimer;
$('#picker-search').addEventListener('input', function() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(renderPicker, 150);
});

// =============================================================================
// Export
// =============================================================================
function exportComp() {
  const hero = slots['hero'];
  const power = slots['power'];
  const lesser = slots['lesser'];
  const greater = slots['greater'];
  const minions = [];
  for (let i = 1; i <= 7; i++) {
    const m = slots[`minion-${i}`];
    if (m) minions.push(m);
  }

  let text = '=== 酒馆战棋阵容 ===\n\n';
  text += `英雄: ${hero ? hero.name_cn : '(未选)'}\n`;
  text += `技能: ${power ? power.name_cn + (power.mana_cost ? ` (${power.mana_cost}费)` : '') : '(未选)'}\n`;
  text += `低阶饰品: ${lesser ? lesser.name_cn : '(未选)'}\n`;
  text += `高阶饰品: ${greater ? greater.name_cn : '(未选)'}\n`;
  text += `\n随从阵容:\n`;
  minions.forEach((m, i) => {
    text += `  ${i+1}. ${m.name_cn} ${m.tier ? '⭐'+m.tier : ''} ${m.attack || 0}/${m.health || 0}`;
    if (m.minion_types_cn && m.minion_types_cn.length) text += ` [${m.minion_types_cn.join(', ')}]`;
    text += '\n';
  });

  const totalAtk = minions.reduce((s,m) => s + (m.attack||0), 0);
  const totalHp = minions.reduce((s,m) => s + (m.health||0), 0);
  text += `\n总攻击: ${totalAtk}  总血量: ${totalHp}`;

  // Copy to clipboard
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => alert('阵容已复制到剪贴板!'));
  } else {
    alert(text);
  }
}

// =============================================================================
// Save / Load / Compare
// =============================================================================
const SAVED_KEY = 'bg_saved_comps';

function getSavedComps() {
  try { return JSON.parse(localStorage.getItem(SAVED_KEY) || '[]'); }
  catch (e) { return []; }
}

function saveCompsToStorage(comps) {
  localStorage.setItem(SAVED_KEY, JSON.stringify(comps));
}

function saveComp() {
  // Check if anything is filled
  const hasContent = Object.values(slots).some(v => v !== null);
  if (!hasContent) { alert('阵容为空，请先添加内容'); return; }

  const name = prompt('请输入阵容名称:', '未命名阵容');
  if (name === null) return; // cancelled
  const compName = name.trim() || '未命名阵容';

  const snapshot = {};
  Object.keys(slots).forEach(k => { if (slots[k]) snapshot[k] = slots[k].str_id; });

  const comps = getSavedComps();
  comps.push({ name: compName, slots: snapshot, savedAt: new Date().toISOString() });
  saveCompsToStorage(comps);
  alert(`「${compName}」已保存!`);
}

function showSavedComps() {
  const comps = getSavedComps();
  const box = document.getElementById('modal-box');

  if (!comps.length) {
    box.innerHTML = `<button class="modal-close" onclick="closeModal()">✕</button>
      <h2>📂 我的阵容</h2>
      <div class="empty" style="text-align:center;padding:40px;">暂无保存的阵容<div class="hint">在编辑器中构建阵容后点击「💾 保存阵容」</div></div>`;
    document.getElementById('modal-overlay').classList.add('show');
    return;
  }

  let html = `<button class="modal-close" onclick="closeModal()">✕</button>
    <h2>📂 我的阵容 (${comps.length})</h2>
    <div class="compare-select" style="margin-bottom:12px;">
      <button onclick="openCompare()" style="padding:6px 16px;background:var(--c-accent);color:var(--bg-deep);border:none;border-radius:var(--r-md);cursor:pointer;font-size:12px;font-weight:bold;">⚖️ 对比阵容</button>
    </div>`;

  comps.forEach((comp, idx) => {
    const cardIds = Object.values(comp.slots);
    const minionIds = Object.entries(comp.slots)
      .filter(([k]) => k.startsWith('minion'))
      .map(([,v]) => v);
    const heroId = comp.slots['hero'];
    const hero = heroId ? DB.cardById[heroId] : null;
    const savedDate = comp.savedAt ? new Date(comp.savedAt).toLocaleString('zh-CN') : '';

    let previewParts = [];
    if (hero) previewParts.push(`<span style="color:var(--c-accent);">${esc(hero.name_cn)}</span>`);
    minionIds.forEach(cid => {
      const c = DB.cardById[cid];
      if (c) previewParts.push(`<span>${esc(c.name_cn)}</span>`);
    });

    html += `<div class="saved-comp-item">
      <div style="flex:1;min-width:0;">
        <div class="comp-name">${esc(comp.name)}</div>
        <div class="comp-preview">${previewParts.join('') || '(空阵容)'}</div>
        <div class="comp-meta">${savedDate}</div>
      </div>
      <button onclick="loadComp(${idx})">📥 加载</button>
      <button onclick="deleteComp(${idx})" class="danger">🗑️ 删除</button>
    </div>`;
  });

  box.innerHTML = html;
  document.getElementById('modal-overlay').classList.add('show');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('show');
}

function loadComp(idx) {
  const comps = getSavedComps();
  const comp = comps[idx];
  if (!comp) return;

  clearAll();
  Object.entries(comp.slots).forEach(([slotId, cardId]) => {
    const card = DB.cardById[cardId];
    if (card) fillSlot(slotId, card);
  });

  activeSlot = null;
  $$('.slot').forEach(s => s.classList.remove('active-slot'));
  updateStats();
  renderPicker();
  closeModal();
}

function deleteComp(idx) {
  const comps = getSavedComps();
  const comp = comps[idx];
  if (!comp || !confirm(`删除「${comp.name}」？`)) return;
  comps.splice(idx, 1);
  saveCompsToStorage(comps);
  showSavedComps(); // refresh modal
}

function openCompare() {
  const comps = getSavedComps();
  if (comps.length < 2) { alert('至少需要保存 2 个阵容才能对比'); return; }

  const box = document.getElementById('modal-box');
  let html = `<button class="modal-close" onclick="closeModal()">✕</button>
    <h2>⚖️ 阵容对比</h2>
    <div class="compare-select">
      <span style="font-size:12px;color:var(--text-muted);">勾选要对比的阵容 (2-4个):</span>
    </div>
    <div id="compare-checklist" style="margin-bottom:16px;">`;

  comps.forEach((comp, idx) => {
    const heroId = comp.slots['hero'];
    const hero = heroId ? DB.cardById[heroId] : null;
    html += `<label style="display:flex;align-items:center;gap:8px;padding:6px 0;font-size:13px;cursor:pointer;">
      <input type="checkbox" value="${idx}" class="cmp-check" ${idx < 2 ? 'checked' : ''}>
      ${esc(comp.name)} ${hero ? ` — ${esc(hero.name_cn)}` : ''}
    </label>`;
  });

  html += `</div>
    <button onclick="doCompare()" style="padding:6px 16px;background:var(--c-accent);color:var(--bg-deep);border:none;border-radius:var(--r-md);cursor:pointer;font-size:12px;font-weight:bold;">开始对比</button>
    <div id="compare-result" style="margin-top:16px;"></div>`;

  box.innerHTML = html;
  document.getElementById('modal-overlay').classList.add('show');
}

function doCompare() {
  const comps = getSavedComps();
  const checks = $$('.cmp-check');
  const selectedIdx = checks.filter(cb => cb.checked).map(cb => parseInt(cb.value));

  if (selectedIdx.length < 2 || selectedIdx.length > 4) {
    alert('请勾选 2-4 个阵容进行对比');
    return;
  }

  const selected = selectedIdx.map(i => comps[i]);

  // Build comparison table
  let html = `<table id="compare-table"><thead><tr>
    <th>项目</th>
    ${selected.map(c => `<th class="comp-col"><div class="comp-header">${esc(c.name)}</div></th>`).join('')}
  </tr></thead><tbody>`;

  // Hero
  html += '<tr><td>英雄</td>';
  selected.forEach(comp => {
    const heroId = comp.slots['hero'];
    const hero = heroId ? DB.cardById[heroId] : null;
    html += `<td>${hero ? `<span style="color:var(--c-accent);">${esc(hero.name_cn)}</span>` : '—'}</td>`;
  });
  html += '</tr>';

  // Hero power
  html += '<tr><td>技能</td>';
  selected.forEach(comp => {
    const hpId = comp.slots['power'];
    const hp = hpId ? DB.cardById[hpId] : null;
    html += `<td>${hp ? `${esc(hp.name_cn)}${hp.mana_cost ? ` (${hp.mana_cost}费)` : ''}` : '—'}</td>`;
  });
  html += '</tr>';

  // Trinkets
  html += '<tr><td>低阶饰品</td>';
  selected.forEach(comp => {
    const tId = comp.slots['lesser'];
    const t = tId ? DB.cardById[tId] : null;
    html += `<td>${t ? esc(t.name_cn) : '—'}</td>`;
  });
  html += '</tr>';

  html += '<tr><td>高阶饰品</td>';
  selected.forEach(comp => {
    const tId = comp.slots['greater'];
    const t = tId ? DB.cardById[tId] : null;
    html += `<td>${t ? esc(t.name_cn) : '—'}</td>`;
  });
  html += '</tr>';

  // Minions (row per slot)
  for (let i = 1; i <= 7; i++) {
    html += `<tr><td>随从 ${i}</td>`;
    selected.forEach(comp => {
      const mId = comp.slots[`minion-${i}`];
      const m = mId ? DB.cardById[mId] : null;
      html += `<td>${m ? `<span class="card-chip">${esc(m.name_cn)} ${m.tier ? '⭐'+m.tier : ''} ${m.attack||0}/${m.health||0}</span>` : '—'}</td>`;
    });
    html += '</tr>';
  }

  // Summary stats
  html += '<tr style="border-top:2px solid var(--border-subtle);"><td style="font-weight:bold;">随从数</td>';
  selected.forEach(comp => {
    const count = Object.entries(comp.slots).filter(([k, v]) => k.startsWith('minion') && v).length;
    html += `<td class="stat-val">${count}</td>`;
  });
  html += '</tr>';

  html += '<tr><td style="font-weight:bold;">总攻击</td>';
  selected.forEach(comp => {
    let sum = 0;
    Object.entries(comp.slots).filter(([k, v]) => k.startsWith('minion') && v).forEach(([,cid]) => {
      const c = DB.cardById[cid]; if (c) sum += c.attack || 0;
    });
    html += `<td class="stat-val">${sum}</td>`;
  });
  html += '</tr>';

  html += '<tr><td style="font-weight:bold;">总血量</td>';
  selected.forEach(comp => {
    let sum = 0;
    Object.entries(comp.slots).filter(([k, v]) => k.startsWith('minion') && v).forEach(([,cid]) => {
      const c = DB.cardById[cid]; if (c) sum += c.health || 0;
    });
    html += `<td class="stat-val">${sum}</td>`;
  });
  html += '</tr>';

  // Tribes
  html += '<tr><td style="font-weight:bold;">种族</td>';
  selected.forEach(comp => {
    const tribes = new Set();
    Object.entries(comp.slots).filter(([k, v]) => k.startsWith('minion') && v).forEach(([,cid]) => {
      const c = DB.cardById[cid]; if (c && c.minion_types_cn) c.minion_types_cn.forEach(t => tribes.add(t));
    });
    html += `<td>${tribes.size ? [...tribes].map(t => `<span class="card-chip">${t}</span>`).join('') : '—'}</td>`;
  });
  html += '</tr>';

  // Hero armor/health
  html += '<tr><td style="font-weight:bold;">英雄护甲/血量</td>';
  selected.forEach(comp => {
    const heroId = comp.slots['hero'];
    const hero = heroId ? DB.heroById[heroId] : null;
    html += `<td>${hero ? `🛡${hero.armor || 0} / ❤${hero.health || 30}` : '—'}</td>`;
  });
  html += '</tr>';

  html += '</tbody></table>';

  const resultDiv = document.getElementById('compare-result');
  if (resultDiv) resultDiv.innerHTML = html;

  // Scroll to result
  setTimeout(() => {
    const box = document.getElementById('modal-box');
    if (box) box.scrollTop = box.scrollHeight;
  }, 100);
}

// =============================================================================
// Utils
// =============================================================================
function esc(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'<').replace(/>/g,'>').replace(/"/g,'&quot;'); }

// =============================================================================
// Boot
// =============================================================================
function loadCompFromHash() {
  const hash = location.hash.replace('#', '');
  if (!hash) return;
  const cardIds = hash.split(',').map(s => s.trim()).filter(Boolean);
  if (!cardIds.length) return;
  // Find cards and fill minion slots
  let slotIdx = 1;
  for (const cid of cardIds) {
    const card = DB.cardById && DB.cardById[cid];
    if (card && slotIdx <= 7) {
      fillSlot(`minion-${slotIdx}`, card);
      slotIdx++;
    }
  }
  if (slotIdx > 1) {
    selectSlot(null);
    renderPicker();
    updateStats();
  }
  // Clear hash after loading
  history.replaceState(null, '', location.pathname);
}

async function boot() {
  try {
    await loadData();
  } catch (e) {
    $('#picker-grid').innerHTML = `<div class="hint" style="color:var(--c-danger);">数据加载失败: ${esc(e.message)}<br><button onclick="location.reload()" style="margin-top:8px;padding:6px 16px;background:var(--c-accent);color:var(--bg-deep);border:none;border-radius:var(--r-md);cursor:pointer;">重试</button></div>`;
    return;
  }
  buildSlots();
  loadCompFromHash();
  if (!activeSlot) selectSlot('hero');
  renderPicker();
  updateStats();
}
boot();
</script>
