<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>酒馆战棋攻略面板</title>
<style>
:root {
  --c-positive: #4caf50;
  --c-positive-glow: rgba(76,175,80,0.2);
  --c-accent: #f0c060;
  --c-accent-glow: rgba(240,192,96,0.15);
  --c-danger: #f44336;
  --c-blue: #2196F3;
  --bg-deep: #0f0f1a;
  --bg-panel: rgba(22,22,37,0.94);
  --bg-card: rgba(22,22,37,0.78);
  --bg-hover: rgba(30,30,50,0.88);
  --bg-input: rgba(15,15,26,0.75);
  --bg-overlay: rgba(0,0,0,0.72);
  --border-subtle: rgba(42,42,58,0.65);
  --text-primary: rgba(255,255,255,0.9);
  --text-secondary: rgba(255,255,255,0.58);
  --text-muted: rgba(255,255,255,0.32);
  --shadow-text: 0 1px 3px rgba(0,0,0,0.7);
  --r-sm: 4px;  --r-md: 6px;  --r-lg: 10px;
  --ease: 0.2s ease;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Microsoft YaHei", "PingFang SC", sans-serif; background:var(--bg-deep); color:var(--text-primary); display:flex; height:100vh; overflow:hidden; }

#sidebar { width:200px; min-width:200px; background:var(--bg-panel); display:flex; flex-direction:column; border-right:1px solid var(--border-subtle); backdrop-filter:blur(8px); }
#sidebar .logo { padding:20px 16px 12px; font-size:18px; font-weight:bold; color:var(--c-accent); text-shadow:var(--shadow-text); border-bottom:1px solid var(--border-subtle); }
#sidebar .logo span { font-size:12px; color:var(--text-muted); display:block; font-weight:normal; margin-top:2px; }
#sidebar nav { flex:1; padding:8px 0; }
#sidebar nav a { display:flex; align-items:center; gap:8px; padding:10px 20px; color:var(--text-secondary); text-decoration:none; font-size:14px; border-left:3px solid transparent; transition:all var(--ease); }
#sidebar nav a:hover { color:var(--text-primary); background:var(--bg-hover); }
#sidebar nav a.active { color:var(--c-accent); background:var(--bg-hover); border-left-color:var(--c-accent); }
#sidebar .stats-bar { padding:12px 16px; border-top:1px solid var(--border-subtle); font-size:11px; color:var(--text-muted); }

#main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
#topbar { padding:12px 24px; background:var(--bg-panel); border-bottom:1px solid var(--border-subtle); display:flex; align-items:center; gap:12px; min-height:48px; backdrop-filter:blur(8px); }
#topbar input { flex:1; max-width:400px; padding:8px 14px; background:var(--bg-input); border:1px solid var(--border-subtle); border-radius:var(--r-md); color:var(--text-primary); font-size:13px; outline:none; transition:border-color var(--ease); }
#topbar input:focus { border-color:var(--c-accent); }
#topbar input::placeholder { color:var(--text-muted); }
#tab-label { font-size:16px; font-weight:bold; color:var(--text-primary); text-shadow:var(--shadow-text); white-space:nowrap; }

#content { flex:1; overflow-y:auto; padding:20px 24px; scroll-behavior:smooth; }

.card-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(160px, 1fr)); gap:10px; }
.card-cell { background:var(--bg-card); border-radius:var(--r-lg); padding:10px; cursor:pointer; border:1px solid var(--border-subtle); transition:border-color var(--ease), background var(--ease); text-align:center; backdrop-filter:blur(4px); }
.card-cell:hover { border-color:var(--c-accent); background:var(--bg-hover); }
.card-cell img { width:100%; max-width:120px; height:auto; border-radius:var(--r-sm); background:var(--bg-deep); min-height:80px; object-fit:contain; }
.card-cell .name { font-size:13px; color:var(--text-primary); margin-top:6px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.card-cell .sub { font-size:11px; color:var(--text-muted); margin-top:2px; }
.card-cell .tier { display:inline-block; background:var(--c-accent); color:var(--bg-deep); font-size:11px; padding:1px 6px; border-radius:var(--r-sm); font-weight:bold; margin-top:3px; }
.card-cell .atk { color:var(--c-positive); font-size:11px; }
.card-cell .hp { color:var(--c-danger); font-size:11px; margin-left:4px; }
.card-cell .type-tags { display:flex; gap:2px; justify-content:center; flex-wrap:wrap; margin-top:4px; }
.card-cell .type-tag { font-size:10px; padding:1px 5px; border-radius:var(--r-sm); background:rgba(42,42,58,0.5); color:var(--text-muted); }

.hero-table { width:100%; border-collapse:collapse; font-size:13px; }
.hero-table th { text-align:left; padding:10px 12px; background:var(--bg-panel); color:var(--text-muted); font-weight:normal; border-bottom:1px solid var(--border-subtle); position:sticky; top:0; z-index:1; }
.hero-table td { padding:8px 12px; border-bottom:1px solid rgba(26,26,42,0.45); }
.hero-table tr:hover td { background:var(--bg-hover); }
.hero-table .rank { color:var(--c-accent); font-weight:bold; }
.hero-table tbody tr:nth-child(1) .rank,
.hero-table tbody tr:nth-child(2) .rank,
.hero-table tbody tr:nth-child(3) .rank { color:var(--c-positive); }

.filters { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; }
.filters button { padding:6px 14px; background:var(--bg-card); border:1px solid var(--border-subtle); border-radius:var(--r-md); color:var(--text-secondary); font-size:12px; cursor:pointer; transition:all var(--ease); }
.filters button:hover { border-color:var(--c-accent); color:var(--text-primary); }
.filters button.active { background:var(--c-accent); color:var(--bg-deep); border-color:var(--c-accent); font-weight:bold; }
.result-count { font-size:12px; color:var(--text-muted); margin-bottom:12px; }

.comp-card { background:var(--bg-card); border-radius:var(--r-lg); padding:16px 20px; margin-bottom:12px; border-left:3px solid var(--c-accent); backdrop-filter:blur(4px); }
.comp-card.accent-green { border-left-color:var(--c-positive); }
.comp-card.accent-blue { border-left-color:var(--c-blue); }
.comp-card h3 { color:var(--c-accent); font-size:16px; margin-bottom:6px; text-shadow:var(--shadow-text); }
.comp-card .stat-big { font-size:28px; font-weight:bold; }
.comp-card .stat-big.green { color:var(--c-positive); }
.comp-card .stat-big.gold { color:var(--c-accent); }
.comp-card .stat-sub { font-size:12px; color:var(--text-muted); }
.comp-card .meta { font-size:12px; color:var(--text-muted); margin-bottom:8px; }
.comp-card .meta span { margin-right:16px; }

.mini-board { display:flex; gap:6px; align-items:center; margin:12px 0; flex-wrap:wrap; }
.mini-slot { width:64px; height:88px; border-radius:var(--r-md); background:var(--bg-deep); border:1px solid var(--border-subtle); position:relative; overflow:hidden; cursor:pointer; transition:border-color var(--ease); flex-shrink:0; }
.mini-slot:hover { border-color:var(--c-accent); }
.mini-slot.core { border-color:var(--c-accent); border-width:2px; }
.mini-slot img { width:100%; height:100%; object-fit:cover; }
.mini-slot .ms-name { position:absolute; bottom:0; left:0; right:0; background:rgba(0,0,0,0.8); font-size:9px; color:var(--text-primary); padding:2px 4px; text-align:center; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.mini-slot .ms-overflow { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; background:rgba(0,0,0,0.6); font-size:16px; color:var(--text-secondary); font-weight:bold; }
.mini-slot .ms-core-badge { position:absolute; top:2px; right:2px; background:var(--c-accent); color:var(--bg-deep); font-size:8px; padding:0 3px; border-radius:2px; font-weight:bold; }
.comp-card .actions { margin-top:10px; display:flex; gap:8px; }
.comp-card .actions a { font-size:12px; color:var(--text-muted); text-decoration:none; transition:color var(--ease); }
.comp-card .actions a:hover { color:var(--c-accent); }
.comp-card .cards-list { display:flex; gap:8px; flex-wrap:wrap; margin:8px 0; }
.comp-card .cards-list .cc { background:var(--bg-deep); padding:4px 10px; border-radius:var(--r-sm); font-size:12px; color:var(--text-primary); cursor:pointer; transition:all var(--ease); }
.comp-card .cards-list .cc:hover { background:var(--c-accent); color:var(--bg-deep); }
.comp-card .tips { font-size:12px; color:var(--text-secondary); }
.comp-card .tips li { margin:3px 0 3px 18px; }

.placement-bars { display:flex; gap:2px; align-items:flex-end; height:36px; }
.placement-bars .pb { flex:1; border-radius:2px 2px 0 0; min-width:8px; transition:height 0.3s ease; }
.pb.f1 { background:#4caf50; } .pb.f2 { background:#8bc34a; }
.pb.f3 { background:#cddc39; } .pb.f4 { background:#ffc107; }
.pb.f5 { background:#ff9800; } .pb.f6 { background:#f44336; }
.pb.f7 { background:#9c27b0; } .pb.f8 { background:#607d8b; }

#modal-overlay { display:none; position:fixed; inset:0; background:var(--bg-overlay); z-index:100; justify-content:center; align-items:center; }
#modal-overlay.show { display:flex; }
#modal { background:var(--bg-panel); border:1px solid var(--border-subtle); border-radius:var(--r-lg); padding:24px; max-width:580px; width:90%; max-height:82vh; overflow-y:auto; position:relative; backdrop-filter:blur(12px); }
#modal .close { position:absolute; top:10px; right:16px; background:none; border:none; color:var(--text-muted); font-size:22px; cursor:pointer; transition:color var(--ease); }
#modal .close:hover { color:var(--c-accent); }
#modal img { max-width:200px; border-radius:var(--r-md); margin-bottom:12px; }
#modal h2 { color:var(--c-accent); font-size:20px; margin-bottom:4px; text-shadow:var(--shadow-text); }
#modal h3 { color:var(--text-muted); font-size:13px; font-weight:normal; margin-bottom:12px; }
#modal .detail-row { display:flex; gap:8px; margin:8px 0; flex-wrap:wrap; }
#modal .detail-tag { background:var(--bg-deep); padding:3px 10px; border-radius:var(--r-sm); font-size:12px; display:inline-block; margin:2px; }
#modal .detail-tag.clickable { cursor:pointer; transition:all var(--ease); }
#modal .detail-tag.clickable:hover { background:var(--c-accent); color:var(--bg-deep); }
#modal .detail-text { font-size:13px; line-height:1.7; color:var(--text-secondary); margin:10px 0; padding:10px; background:var(--bg-deep); border-radius:var(--r-md); }
#modal .section-title { font-size:12px; color:var(--c-accent); font-weight:bold; margin:12px 0 4px; text-transform:uppercase; letter-spacing:1px; }

.modal-section { margin-top:12px; border:1px solid var(--border-subtle); border-radius:var(--r-md); overflow:hidden; }
.modal-section .section-header { padding:8px 12px; background:var(--bg-card); color:var(--text-secondary); font-size:12px; cursor:pointer; user-select:none; transition:background var(--ease); display:flex; justify-content:space-between; align-items:center; }
.modal-section .section-header:hover { background:var(--bg-hover); color:var(--c-accent); }
.modal-section .section-header.collapsed { border-bottom:none; }
.modal-section .section-body { padding:8px 12px; transition:max-height 0.25s ease, padding 0.25s ease; max-height:600px; overflow:hidden; }
.modal-section .section-body.collapsed { max-height:0; padding-top:0; padding-bottom:0; }

.skeleton { animation:pulse 1.5s ease-in-out infinite; }
@keyframes pulse { 0%,100% { opacity:.3; } 50% { opacity:.6; } }
.skel-row { height:40px; background:var(--bg-hover); margin-bottom:4px; border-radius:var(--r-sm); }
.skel-cell { height:180px; background:var(--bg-hover); border-radius:var(--r-lg); }

::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:var(--bg-deep); }
::-webkit-scrollbar-thumb { background:var(--border-subtle); border-radius:3px; }

.empty { text-align:center; padding:60px 20px; color:var(--text-muted); }
.empty .hint { font-size:13px; color:var(--text-muted); margin-top:8px; }
.section-subhead { margin-top:24px; margin-bottom:12px; color:var(--text-secondary); font-size:14px; }
.hero-icon { width:36px;height:36px;border-radius:50%;object-fit:cover;vertical-align:middle; }
.hero-icon-sm { width:28px;height:28px;border-radius:50%;object-fit:cover;vertical-align:middle;margin-right:8px; }
tr.clickable { cursor:pointer; }
</style>
</head>
<body>

<aside id="sidebar">
  <div class="logo">酒馆战棋<span>攻略分析面板</span></div>
  <nav id="nav">
    <a href="#heroes" data-tab="heroes"><span class="icon">👑</span> 英雄排行</a>
    <a href="#player" data-tab="player"><span class="icon">👤</span> 我的战绩</a>
    <a href="#minions" data-tab="minions"><span class="icon">⚔️</span> 随从图鉴</a>
    <a href="#powers" data-tab="powers"><span class="icon">✨</span> 技能/饰品</a>
    <a href="#companions" data-tab="companions"><span class="icon">🐾</span> 伙伴/任务</a>
    <a href="#comps" data-tab="comps"><span class="icon">📊</span> 流派攻略</a>
    <a href="#predict" data-tab="predict"><span class="icon">🎯</span> 胜率预测</a>
    <a href="#other" data-tab="other"><span class="icon">🌀</span> 异变/时光</a>
    <a href="#search" data-tab="search"><span class="icon">🔍</span> 全局搜索</a>
  </nav>
  <div class="stats-bar" id="stats-bar">加载中...</div>
  <div style="padding:8px 16px;border-top:1px solid var(--border-subtle);text-align:center;">
    <button onclick="doRefresh()" style="background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:var(--r-md);color:var(--text-muted);font-size:11px;padding:4px 12px;cursor:pointer;transition:all var(--ease);">🔄 刷新数据</button>
  </div>
</aside>

<div id="main">
  <div id="topbar">
    <span id="tab-label">英雄排行</span>
    <input type="text" id="quick-search" placeholder="在当前页签中搜索...">
  </div>
  <div id="content"><div class="empty skeleton">加载中...</div></div>
</div>

<div id="modal-overlay"><div id="modal"></div></div>

<script>
// =============================================================================
// App Shell
// =============================================================================
const $ = (sel, el) => (el || document).querySelector(sel);
const $$ = (sel, el) => [...(el || document).querySelectorAll(sel)];

const $nav = $('#nav');
const $content = $('#content');
const $tabLabel = $('#tab-label');
const $search = $('#quick-search');
const $modalOverlay = $('#modal-overlay');
const $modal = $('#modal');
const $statsBar = $('#stats-bar');

// =============================================================================
// Data Store
// =============================================================================
const STORE = {};

const ep = u => fetch(u).then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); });
let _dataLoaded = false;
let _playerLoading = false;
let _stratsLoading = false;
let _fetchError = null;
let _playerError = null;
let _stratsError = null;

async function fetchBase() {
  try {
    const [cards, heroes, minions, trinkets, companions, qr,
           anomalies, timewarps, heroStats, heroPowers, comps] =
      await Promise.all([
        ep('/api/cards'), ep('/api/heroes'), ep('/api/minions'),
        ep('/api/trinkets'), ep('/api/companions'), ep('/api/quests_rewards'),
        ep('/api/anomalies'), ep('/api/timewarps'), ep('/api/hero_stats'),
        ep('/api/hero_powers'), ep('/api/comps'),
      ]);

    Object.assign(STORE, {
      cards, heroes, minions, trinkets, companions,
      quests: qr.quests || [], rewards: qr.rewards || [],
      anomalies, timewarps, heroStats, heroPowers, comps,
    });

    // Build lookup indexes
    STORE.cardById = {};
    cards.forEach(c => STORE.cardById[c.str_id] = c);
    STORE.heroById = {};
    heroes.forEach(h => STORE.heroById[h.str_id] = h);

    _fetchError = null;
    _dataLoaded = true;
  } catch (e) {
    _fetchError = `数据加载失败: ${e.message}`;
    console.error('fetchBase:', e);
  }
}

async function fetchPlayerData() {
  if (_playerLoading) return;
  _playerLoading = true;
  try {
    const [playerHeroes, playerSummary, playerRecent, playerCards] = await Promise.all([
      ep('/api/player/heroes'), ep('/api/player/summary'),
      ep('/api/player/recent'), ep('/api/player/cards'),
    ]);
    Object.assign(STORE, { playerHeroes, playerSummary, playerRecent, playerCards });
    $statsBar.innerHTML = `卡牌 ${STORE.cards.length} · 英雄 ${STORE.heroes.length} · 随从 ${STORE.minions.length}<br>流派 ${STORE.comps.length} · 环境数据 ${STORE.heroStats.length} 英雄 · 个人对局 ${playerSummary.total_games || 0}`;
    _playerError = null;
  } catch (e) {
    _playerError = `个人数据加载失败: ${e.message}`;
    console.error('fetchPlayerData:', e);
  } finally { _playerLoading = false; }
}

async function fetchStrategyData() {
  if (_stratsLoading) return;
  _stratsLoading = true;
  try {
    const [trinketTips, heroStrats] = await Promise.all([
      ep('/api/trinket_tips'), ep('/api/hero_strategies'),
    ]);
    Object.assign(STORE, {
      trinketTips,
      heroTips: heroStrats.tips || {}, curves: heroStrats.curves || [],
    });
    _stratsError = null;
  } catch (e) {
    _stratsError = `攻略数据加载失败: ${e.message}`;
    console.error('fetchStrategyData:', e);
  } finally { _stratsLoading = false; }
}

async function ensurePlayerData() { if (!STORE.playerSummary && !_playerError) await fetchPlayerData(); }
async function ensureStrategyData() { if (!STORE.trinketTips && !_stratsError) await fetchStrategyData(); }

function refreshAll() {
  _playerError = null; _stratsError = null; _fetchError = null;
  return Promise.all([
    fetchBase(),
    STORE.playerSummary ? fetchPlayerData() : Promise.resolve(),
    STORE.trinketTips ? fetchStrategyData() : Promise.resolve(),
  ]);
}

async function doRefresh() {
  const btn = event.target;
  btn.textContent = '⏳ 刷新中...';
  btn.disabled = true;
  await refreshAll();
  viewCache = {};
  if (!_fetchError) activateTab(currentTab);
  else $content.innerHTML = errorBanner(_fetchError);
  btn.textContent = '🔄 刷新数据';
  btn.disabled = false;
}

function errorBanner(msg) {
  return `<div style="text-align:center;padding:40px 20px;">
    <div style="color:var(--c-danger);font-size:16px;margin-bottom:12px;">⚠️ ${esc(msg)}</div>
    <button onclick="refreshAll().then(()=>{viewCache={};activateTab(currentTab)})" style="padding:8px 20px;background:var(--c-accent);color:var(--bg-deep);border:none;border-radius:var(--r-md);font-size:13px;font-weight:bold;cursor:pointer;">🔄 重试</button>
  </div>`;
}

// =============================================================================
// Filter State (persists across re-renders, survives DOM replacement)
// =============================================================================
const filterState = {
  heroes: { mode: 'meta' },
  minions: { tier: 'all', type: 'all' },
  powers: { cat: 'powers', lesser: 'all', mana: 'all', tribe: 'all', tw_tier: 'all' },
  companions: { cat: 'companions' },
  other: { cat: 'anomalies' },
};

function setFilterState(tabId, key, val) {
  if (filterState[tabId]) filterState[tabId][key] = val;
}

// Tribe list for trinket/timewarp filters (from minion_types_cn)
function tribeOptions() {
  const set = new Set();
  STORE.trinkets.forEach(t => (t.extra || []).forEach(e => { if (e.startsWith('minionType')) set.add(e.replace('minionType','')); }));
  STORE.timewarps.forEach(t => (t.extra || []).forEach(e => { if (e.startsWith('minionType')) set.add(e.replace('minionType','')); }));
  return [...set].sort();
}

// =============================================================================
// Router
// =============================================================================
let currentTab = 'heroes';
let viewCache = {};       // tab -> { html, filtersKey }

function navigate(tabId) {
  if (currentTab === tabId) return;
  currentTab = tabId;
  activateTab(tabId, true);
}

function activateTab(tabId, fromRouter) {
  currentTab = tabId;

  // Nav state
  $$('#nav a').forEach(a => a.classList.remove('active'));
  const link = $(`[data-tab="${tabId}"]`);
  if (link) {
    link.classList.add('active');
    $tabLabel.textContent = link.textContent.trim();
  }

  // Search: clear on tab switch, keep for search tab
  if (fromRouter) {
    $search.value = '';
    $search.placeholder = tabId === 'search' ? '输入关键词搜索所有卡牌...' : '在当前页签中搜索...';
  }

  // Render
  const tab = TABS[tabId];
  if (!tab) return;
  const filtersKey = tab.filtersKey ? tab.filtersKey() : '_';
  const cached = viewCache[tabId];
  const q = $search.value.trim().toLowerCase();

  if (cached && cached.filtersKey === filtersKey && !q) {
    $content.innerHTML = cached.html;
  } else {
    $content.innerHTML = tab.render(q);
    if (!q) viewCache[tabId] = { html: $content.innerHTML, filtersKey };
  }
  $content.scrollTop = 0;
}

// Hash routing
function onHashChange() {
  const tabId = (location.hash || '#heroes').slice(1);
  if (TABS[tabId]) navigate(tabId);
  else location.hash = '#heroes';
}
window.addEventListener('hashchange', onHashChange);

$nav.addEventListener('click', e => {
  const a = e.target.closest('a');
  if (!a) return;
  e.preventDefault();
  location.hash = a.dataset.tab;
});

// =============================================================================
// Search
// =============================================================================
let searchTimer;
$search.addEventListener('input', function() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    const tab = TABS[currentTab];
    if (!tab) return;
    const q = this.value.trim().toLowerCase();
    viewCache[currentTab] = null; // invalidate cache when searching
    $content.innerHTML = tab.render(q);
    $content.scrollTop = 0;
  }, 180);
});

// =============================================================================
// Filter Delegation
// =============================================================================
$content.addEventListener('click', e => {
  const btn = e.target.closest('.filters button');
  if (!btn) return;
  const groupId = btn.parentElement.id;
  const val = btn.dataset.val;

  // Map group ID → filterState key
  const map = { 'heroes-mode-filter': ['heroes','mode'],
	                'minion-tier-filter': ['minions','tier'], 'minion-type-filter': ['minions','type'],
                'powers-filter': ['powers','cat'], 'trinket-lesser': ['powers','lesser'],
                'trinket-mana': ['powers','mana'], 'trinket-tribe': ['powers','tribe'],
                'tw-tier': ['powers','tw_tier'], 'companions-filter': ['companions','cat'],
                'other-filter': ['other','cat'] };
  if (map[groupId]) setFilterState(map[groupId][0], map[groupId][1], val);

  viewCache[currentTab] = null;
  const q = $search.value.trim().toLowerCase();
  $content.innerHTML = TABS[currentTab].render(q);
  $content.scrollTop = 0;
});

// =============================================================================

// =============================================================================
function cardCellHTML(c, extra) {
  return `<div class="card-cell" data-cid="${c.str_id}">
    <img src="${esc(c.img) || ''}" loading="lazy" onerror="this.style.display='none'">
    <div class="name">${esc(c.name_cn)}</div>
    ${extra || ''}
  </div>`;
}

function minionCellHTML(m) {
  const tags = (m.minion_types_cn || []).map(t => `<span class="type-tag">${t}</span>`).join('');
  return cardCellHTML(m, `
    <div class="sub"><span class="atk">⚔${m.attack}</span><span class="hp">❤${m.health}</span></div>
    ${tags ? `<div class="type-tags">${tags}</div>` : ''}
    <span class="tier">⭐${m.tier}</span>`);
}

function placementBarsHTML(dist, opts) {
  opts = opts || {};
  const max = Math.max(...dist.map(d => d.percentage || 0), 1);
  const showLabel = opts.labels || false;
  return `<div class="placement-bars" style="${opts.style || ''}">${dist.map(d => {
    const h = Math.max((d.percentage / max) * 100, 2);
    const label = showLabel ? `<span style="font-size:9px;writing-mode:vertical-lr;position:absolute;bottom:2px;">${d.percentage.toFixed(1)}%</span>` : '';
    return `<div class="pb f${d.rank}" style="height:${h}%;${opts.minHeight || ''}" title="#${d.rank}: ${d.percentage.toFixed(1)}%">${label}</div>`;
  }).join('')}</div>`;
}

function esc(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'<').replace(/>/g,'>').replace(/"/g,'&quot;'); }

          <h3>${esc(c.name || '未知流派')} <span style="font-size:12px;color:var(--text-muted);font-weight:normal;">${c.power_level || '?'}级</span></h3>
          <div class="meta">
            <span>🎯 ${diffMap[c.difficulty] || c.difficulty || '?'}</span>
            ${c.forced_tribes && c.forced_tribes.length ? `<span>🏹 ${c.forced_tribes.join(', ')}</span>` : ''}
            <span>${cards.length}张核心卡</span>
          </div>
          ${boardHTML}
          ${tips.length ? `<details style="margin-top:8px;"><summary style="color:var(--text-muted);font-size:12px;cursor:pointer;">💡 攻略提示 (${tips.length}条)</summary><ul class="tips">${tips.map(t => `<li>${esc(t.tip || t.summary || t)}${t.author ? ` <span style="color:var(--text-muted);font-size:10px;">— ${esc(t.author)}</span>` : ''}</li>`).join('')}</ul></details>` : ''}
          <div class="actions">
            <a href="/team-builder#${(c.cards||[]).map(cc=>cc.cardId||cc).filter(Boolean).join(',')}" target="_blank">📋 加载到阵容编辑器 (${(c.cards||[]).length}张)</a>
          </div>
        </div>`;
      }).join('');
    },
  },

  // ----- Predict -----
  predict: {
    filtersKey() { return '_'; },
    render(q) {
      if (!STORE.heroes || !STORE.heroes.length) return '<div class="empty">加载中...</div>';

      let html = '<div style="display:flex;gap:12px;align-items:flex-start;flex-wrap:wrap;margin-bottom:16px;">';
      html += `<select id="pred-hero" onchange="predictHero()" style="padding:6px 10px;background:var(--bg-input);border:1px solid var(--border-subtle);border-radius:var(--r-md);color:var(--text-primary);font-size:13px;max-width:200px;">
        <option value="">选择英雄...</option>
        ${STORE.heroes.map(h => `<option value="${h.str_id}">${esc(h.name_cn)}</option>`).join('')}
      </select>`;
      html += '</div>';

      html += '<div id="predict-result"><div class="empty">选择英雄查看个人胜率预测<div class="hint">基于你的历史对局数据分析</div></div></div>';
      return html;
    },
  },

  // ----- Other (Anomalies + Timewarps) -----
  other: {
    filtersKey() { return filterState.other.cat; },
    render(q) {
      const cat = filterState.other.cat;
      let html = `<div class="filters" id="other-filter">
        <button data-val="anomalies"${cat==='anomalies'?' class="active"':''}>异变</button>
        <button data-val="timewarps"${cat==='timewarps'?' class="active"':''}>时光法术</button>
      </div>`;

      let list = cat === 'timewarps' ? STORE.timewarps : STORE.anomalies;
      if (q) list = list.filter(x => x.name_cn.toLowerCase().includes(q));

      html += `<div class="result-count">${list.length} 张</div>`;
      if (list.length) {
        html += `<div class="card-grid">${list.map(c => {
          let extra = c.tier ? `<span class="tier">⭐${c.tier}</span>` : '';
          return cardCellHTML(c, extra);
        }).join('')}</div>`;
      } else {
        html += '<div class="empty">没有匹配的卡牌<div class="hint">尝试切换分类筛选</div></div>';
      }
      return html;
    },
  },

  // ----- Search -----
  search: {
    filtersKey() { return '_'; },
    render(q) {
      if (!q) return '<div class="empty">输入关键词搜索所有卡牌<div class="hint">支持中文名、英文名、卡牌描述</div></div>';

      const results = STORE.cards.filter(c =>
        c.name_cn.toLowerCase().includes(q) ||
        (c.name || '').toLowerCase().includes(q) ||
        (c.text_cn || '').toLowerCase().includes(q)
      );
      if (!results.length) return '<div class="empty">未找到匹配卡牌</div>';

      const typeNames = { hero:'英雄', minion:'随从', hero_power:'技能', companion:'伙伴',
        trinket:'饰品', quest:'任务', reward:'任务奖励', anomaly:'异变', timewarp:'时光法术', tavern:'酒馆' };

      return `<div class="result-count">找到 ${results.length} 张卡牌</div>
        <div class="card-grid">${results.map(c => {
          let extra = `<div class="sub">${typeNames[c.card_type] || c.card_type}</div>`;
          if (c.tier) extra += `<span class="tier">⭐${c.tier}</span>`;
          return cardCellHTML(c, extra);
        }).join('')}</div>`;
    },
  },
};

// =============================================================================
// Card Detail Modal
// =============================================================================
let _compByCard = null;
function compsByCard() {
  if (_compByCard) return _compByCard;
  _compByCard = {};
  (STORE.comps || []).forEach(comp => {
    (comp.cards || []).forEach(cc => {
      const cid = cc.cardId || cc;
      if (!cid) return;
      if (!_compByCard[cid]) _compByCard[cid] = [];
      if (!_compByCard[cid].find(c => c.name === comp.name)) _compByCard[cid].push(comp);
    });
  });
  return _compByCard;
}

function showDetail(strId) {
  const card = STORE.cardById[strId];
  if (!card) return;

  const heroStat = STORE.heroStats.find(h => h.hero_card_id === strId);
  const heroTips = STORE.heroTips[strId];
  const ttip = STORE.trinketTips[strId];
  const typeNames = { hero:'英雄', minion:'随从', hero_power:'英雄技能', companion:'伙伴',
    trinket:'饰品', quest:'任务', reward:'任务奖励', anomaly:'异变', timewarp:'时光法术', tavern:'酒馆法术' };
  const ctype = typeNames[card.card_type] || card.card_type;

  // --- Stats tags ---
  let statTags = '';
  if (card.armor) statTags += `<span class="detail-tag">🛡 护甲 ${card.armor}</span>`;
  if (card.health && card.card_type === 'hero') statTags += `<span class="detail-tag">❤ 血量 ${card.health}</span>`;
  if ((card.card_type === 'minion' || card.card_type === 'companion') && (card.attack || card.health)) {
    statTags += `<span class="detail-tag">⚔${card.attack || 0} / ❤${card.health || 0}</span>`;
  }
  if (card.mana_cost) statTags += `<span class="detail-tag">💰 ${card.mana_cost} 费</span>`;
  if (card.lesser !== undefined && card.lesser !== null) {
    statTags += `<span class="detail-tag">${card.lesser ? '🔹 低阶' : '🔸 高阶'}</span>`;
  }
  if (card.minion_types_cn && card.minion_types_cn.length) {
    statTags += `<div class="detail-row">${card.minion_types_cn.map(t => `<span class="detail-tag">${t}</span>`).join('')}</div>`;
  }

  // --- Sections to build ---
  let sections = '';

  // Hero personal stats
  if (card.card_type === 'hero') {
    const pStats = (STORE.playerHeroes || []).find(h => h.hero_card_id === strId);
    if (pStats && pStats.games_played > 0) {
      sections += `<div class="modal-section">
        <div class="section-header" data-toggle="personal-stats" style="color:var(--c-positive);">👤 我的战绩 (${pStats.games_played}场) ▾</div>
        <div class="section-body" id="personal-stats">
          <div class="detail-row">
            <span class="detail-tag">🏆 均排名 ${pStats.avg_placement.toFixed(2)}</span>
            <span class="detail-tag">📊 ${pStats.games_played} 场</span>
            <span class="detail-tag">📈 前四率 ${pStats.top4_rate}%</span>
            <span class="detail-tag">👑 吃鸡 ${pStats.top1_count}次</span>
          </div>
        </div>
      </div>`;
    }
    // Hero comp breakdown placeholder
      sections += `<div class="modal-section" id="hero-comp-section">
        <div class="section-header" data-toggle="hero-comp" style="color:var(--c-accent);">📊 流派表现 ▾</div>
        <div class="section-body" id="hero-comp">
          <div style="color:var(--text-muted);font-size:12px;padding:8px;">加载中...</div>
        </div>
      </div>`;
  }

  // Hero environment stats
  if (heroStat) {
    let bars = '';
    if (heroStat.placements && heroStat.placements.length) {
      bars = placementBarsHTML(heroStat.placements, { labels: true, style: 'margin:8px 0', minHeight: 'min-height:24px' });
    }
    sections += `<div class="modal-section">
      <div class="section-header" data-toggle="hero-stats">📊 环境数据 ▾</div>
      <div class="section-body" id="hero-stats">
        <div class="detail-row">
          <span class="detail-tag">🏆 均排名 ${heroStat.avg_position.toFixed(2)}</span>
          <span class="detail-tag">📊 ${heroStat.data_points.toLocaleString()} 场</span>
        </div>${bars}
      </div>
    </div>`;
  }

  // Related comps (reverse lookup)
  const relatedComps = compsByCard()[strId] || [];
  if (relatedComps.length) {
    sections += `<div class="modal-section">
      <div class="section-header" data-toggle="related-comps">📋 所属流派 (${relatedComps.length}) ▾</div>
      <div class="section-body" id="related-comps">
        ${relatedComps.map(c => `<span class="detail-tag" style="margin:3px;">${esc(c.name || '未知流派')}</span>`).join('')}
      </div>
    </div>`;
  }

  // Hero relationships
  if (card.card_type === 'hero') {
    const hero = STORE.heroById[strId];
    if (hero) {
      let relTags = '';
      if (hero.buddy_id) {
        const buddy = STORE.companions.find(c => c.str_id === hero.buddy_id);
        if (buddy) relTags += `<span class="detail-tag clickable" data-cid="${buddy.str_id}">🐾 伙伴: ${esc(buddy.name_cn)}</span>`;
      }
      if (hero.hp_ids) hero.hp_ids.forEach(hpid => {
        const hp = STORE.heroPowers.find(p => p.str_id === hpid);
        if (hp) relTags += `<span class="detail-tag clickable" data-cid="${hp.str_id}">✨ ${esc(hp.name_cn)} ${hp.mana_cost ? `(${hp.mana_cost}费)` : ''}</span>`;
      });
      if (relTags) {
        sections += `<div class="modal-section">
          <div class="section-header" data-toggle="hero-rel">🔗 关联卡牌 ▾</div>
          <div class="section-body" id="hero-rel">${relTags}</div>
        </div>`;
      }
    }
  }

  // Hero tips
  if (heroTips && heroTips.tips && heroTips.tips.length) {
    sections += `<div class="modal-section">
      <div class="section-header" data-toggle="hero-tips">💡 攻略提示 (${heroTips.tips.length}) ▾</div>
      <div class="section-body" id="hero-tips">
        <ul class="tips">${heroTips.tips.map(t => `<li>${esc(t)}</li>`).join('')}</ul>
      </div>
    </div>`;
  }

  // Trinket tips
  if (ttip && ttip.tips && ttip.tips.length) {
    sections += `<div class="modal-section">
      <div class="section-header" data-toggle="trinket-tips">💎 饰品提示 (${ttip.tips.length}) ▾</div>
      <div class="section-body" id="trinket-tips">
        <ul class="tips">${ttip.tips.map(t => `<li>${esc(t.summary || t.tip || '')}</li>`).join('')}</ul>
      </div>
    </div>`;
  }

  $modal.innerHTML = `
    <button class="close" id="modal-close">✕</button>
    <div style="display:flex;gap:20px;flex-wrap:wrap;">
      ${card.img ? `<img src="${esc(card.img)}" onerror="this.style.display='none'" style="max-width:200px;border-radius:8px;">` : ''}
      <div style="flex:1;min-width:200px;">
        <h2>${esc(card.name_cn)}</h2>
        <h3>${esc(card.name || '')} · ${ctype}${card.tier ? ` · ⭐${card.tier}星` : ''}</h3>
        ${statTags ? `<div style="margin:8px 0;">${statTags}</div>` : ''}
        ${card.text_cn ? `<div class="detail-text">${esc(card.text_cn)}</div>` : ''}
        ${sections}
      </div>
    </div>`;

  // Bind toggle events
  $modal.querySelectorAll('.section-header').forEach(hdr => {
    hdr.addEventListener('click', () => {
      const body = document.getElementById(hdr.dataset.toggle);
      if (body) {
        body.classList.toggle('collapsed');
        hdr.classList.toggle('collapsed');
      }
    });
  });

  $modalOverlay.classList.add('show');
  // Async load hero comp breakdown
  if (card.card_type === 'hero') {
    fetch(`/api/player/hero_comps?hero_id=${encodeURIComponent(strId)}`)
      .then(r => r.json())
      .then(data => {
        const container = document.getElementById('hero-comp');
        if (!container) return;
        if (!data || !data.length) {
          container.innerHTML = '<div style="color:var(--text-muted);font-size:12px;padding:8px;">暂无流派数据<div class="hint" style="font-size:11px;">当对局终局阵容与已知流派匹配时（需≥2张核心卡重合），自动统计</div></div>';
          return;
        }
        let html = '<table style="width:100%;font-size:12px;border-collapse:collapse;">';
        html += '<tr style="color:var(--text-muted);border-bottom:1px solid var(--border-subtle);"><th style="text-align:left;padding:4px 8px;">流派</th><th style="text-align:right;padding:4px 8px;">场次</th><th style="text-align:right;padding:4px 8px;">均排名</th><th style="text-align:right;padding:4px 8px;">前四率</th></tr>';
        data.forEach(d => {
          const color = d.avg_placement <= 3.5 ? 'var(--c-positive)' : d.avg_placement <= 4.5 ? 'var(--c-accent)' : 'var(--c-danger)';
          html += `<tr style="border-bottom:1px solid rgba(26,26,42,0.45);">
            <td style="padding:4px 8px;">${esc(d.comp_name)}</td>
            <td style="text-align:right;padding:4px 8px;">${d.games}</td>
            <td style="text-align:right;padding:4px 8px;color:${color};font-weight:bold;">${d.avg_placement.toFixed(2)}</td>
            <td style="text-align:right;padding:4px 8px;">${d.top4_rate}%</td>
          </tr>`;
        });
        html += '</table>';
        container.innerHTML = html;
      })
      .catch(() => {
        const container = document.getElementById('hero-comp');
        if (container) container.innerHTML = '<div style="color:var(--text-muted);font-size:12px;padding:8px;">加载失败</div>';
      });
  }

}

function closeModal() { $modalOverlay.classList.remove('show'); }
$modalOverlay.addEventListener('click', e => { if (e.target === $modalOverlay) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// Click delegation for card detail from content + modal
$content.addEventListener('click', e => {
  const cell = e.target.closest('[data-cid]');
  if (cell) showDetail(cell.dataset.cid);
});
$modal.addEventListener('click', e => {
  if (e.target.id === 'modal-close') closeModal();
  const tag = e.target.closest('[data-cid]');
  if (tag) showDetail(tag.dataset.cid);
});

// Comp card click
$content.addEventListener('click', e => {
  const cell = e.target.closest('.comp-card .cc[data-cid]');
  if (cell) { e.stopPropagation(); showDetail(cell.dataset.cid); }
});

// =============================================================================
// Predict
// =============================================================================
async function predictHero() {
  const heroId = document.getElementById('pred-hero').value;
  const container = document.getElementById('predict-result');
  if (!heroId) {
    container.innerHTML = '<div class="empty">选择英雄查看个人胜率预测<div class="hint">基于你的历史对局数据分析</div></div>';
    return;
  }

  container.innerHTML = '<div class="empty skeleton"><div class="skel-row"></div><div class="skel-row"></div></div>';

  try {
    const resp = await fetch(`/api/player/predict?hero_id=${encodeURIComponent(heroId)}`);
    const data = await resp.json();

    if (!data.games) {
      container.innerHTML = `<div class="empty">暂无该英雄的对局数据<div class="hint">${data.msg || ''}</div></div>`;
      return;
    }

    let html = '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:16px;">';
    html += `<div class="comp-card accent-green"><h3>场次</h3><div class="stat-big green">${data.games}</div></div>`;
    html += `<div class="comp-card"><h3>均排名</h3><div class="stat-big gold">${data.avg_placement.toFixed(2)}</div></div>`;
    html += `<div class="comp-card accent-green"><h3>前四率</h3><div class="stat-big green">${data.top4_rate}%</div></div>`;
    html += `<div class="comp-card"><h3>吃鸡率</h3><div class="stat-big gold">${data.top1_rate}%</div></div>`;
    html += '</div>';

    // Placement distribution
    html += '<h3 class="section-subhead">📊 排名分布</h3>';
    html += placementBarsHTML(data.placement_dist, { labels: true, style: 'margin:8px 0;height:48px;', minHeight: 'min-height:32px' });

    // Best comps
    if (data.best_comps && data.best_comps.length) {
      html += '<h3 class="section-subhead">🏗️ 最佳流派搭配</h3>';
      html += '<table class="hero-table"><thead><tr><th>流派</th><th>场次</th><th>均排名</th><th>前四率</th></tr></thead><tbody>';
      data.best_comps.forEach(d => {
        const color = d.avg_placement <= 3.5 ? 'var(--c-positive)' : d.avg_placement <= 4.5 ? 'var(--c-accent)' : 'var(--c-danger)';
        html += `<tr>
          <td>${esc(d.comp_name)}</td>
          <td>${d.games}</td>
          <td style="color:${color};font-weight:bold;">${d.avg_placement.toFixed(2)}</td>
          <td>${d.top4_rate}%</td>
        </tr>`;
      });
      html += '</tbody></table>';
    }

    container.innerHTML = html;
  } catch (e) {
    container.innerHTML = `<div class="empty" style="color:var(--c-danger);">加载失败: ${esc(e.message)}</div>`;
  }
}

// =============================================================================
// Game Recording
// =============================================================================
function recordGame() {
  const heroInput = document.getElementById('rec-hero');
  const placement = document.getElementById('rec-placement').value;
  const comp = document.getElementById('rec-comp').value;
  const mmrChange = parseInt(document.getElementById('rec-mmr').value) || 0;
  const msg = document.getElementById('rec-msg');

  if (!heroInput._selectedId || !placement) {
    msg.style.display = 'inline'; msg.style.color = 'var(--c-danger)';
    msg.textContent = '请选择英雄和排名';
    return;
  }

  fetch('/api/games', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ hero_card_id: heroInput._selectedId, placement: parseInt(placement), starting_comp: comp, mmr_change: mmrChange }),
  }).then(r => r.json()).then(data => {
    if (data.ok) {
      msg.style.display = 'inline'; msg.style.color = 'var(--c-positive)';
      msg.textContent = '已记录！刷新数据中...';
      setTimeout(() => {
        refreshAll().then(() => {
          viewCache = {};
          const q = $search.value.trim().toLowerCase();
          $content.innerHTML = TABS[currentTab].render(q);
          msg.textContent = '已记录 #' + data.game_id;
        });
      }, 500);
    }
  }).catch(() => {
    msg.style.display = 'inline'; msg.style.color = 'var(--c-danger)';
    msg.textContent = '提交失败';
  });
}

// Hero autocomplete for record form
document.addEventListener('input', e => {
  if (e.target.id !== 'rec-hero') return;
  const val = e.target.value.trim().toLowerCase();
  const suggestions = document.getElementById('rec-hero-suggestions');
  if (!val || val.length < 1) { suggestions.style.display = 'none'; return; }
  const matches = (STORE.heroes || []).filter(h => h.name_cn.toLowerCase().includes(val)).slice(0, 8);
  if (!matches.length) { suggestions.style.display = 'none'; return; }
  suggestions.innerHTML = matches.map(h =>
    `<div style="padding:6px 10px;cursor:pointer;font-size:12px;color:var(--text-primary);"
       onmouseover="this.style.background='var(--bg-hover)'"
       onmouseout="this.style.background='none'"
       onclick="document.getElementById('rec-hero').value='${esc(h.name_cn)}';document.getElementById('rec-hero')._selectedId='${h.str_id}';document.getElementById('rec-hero-suggestions').style.display='none'">
       ${esc(h.name_cn)}
    </div>`
  ).join('');
  suggestions.style.display = 'block';
});
document.addEventListener('click', e => {
  if (e.target.id !== 'rec-hero') {
    document.getElementById('rec-hero-suggestions').style.display = 'none';
  }
});

// =============================================================================
// Boot
// =============================================================================
async function boot() {
  $content.innerHTML = '<div class="empty skeleton"><div style="max-width:600px;margin:0 auto;">' +
    Array(6).fill('<div class="skel-row"></div>').join('') + '</div>';
  await fetchBase();
  if (_fetchError) {
    $content.innerHTML = errorBanner(_fetchError);
    return;
  }
  $statsBar.innerHTML = `卡牌 ${STORE.cards.length} · 英雄 ${STORE.heroes.length} · 随从 ${STORE.minions.length}<br>流派 ${STORE.comps.length} · 环境数据 ${STORE.heroStats.length} 英雄`;
  onHashChange();
  // Preload in background
  fetchPlayerData();
  fetchStrategyData();
}
boot();
